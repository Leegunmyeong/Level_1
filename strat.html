<!doctype html>
<!-- html5 문서 선언 -->
<html lang="ko"> <!-- 문서시작, 언어속성="한국어" 스크린리더기준비 -->

<head> <!-- 웹 문서 머리부분 시작(제목, 주소등위치) -->
  <!-- meta처럼 닫기 태그가 없는 태그를 빈태그라고 함. -->
  <!-- meta태그는 웹앱의 설정값을 담는 태그 -->
  <meta charset="UTF-8" /><!-- 다국어 문자열 표시 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="keywords" content="교보, 문고, 교보문고"><!-- 검색 키워드(개수제한없음) -->
  <meta name="description" content="교보문고 회원이 아니신가요? 가입하면 다양한 책 할인혜택이 있습니다."><!-- 사이트 검색 시 나타나는 요약설명 -->
  <!-- (위) 각 디바이스(모바일, 태블릿, pc)의 너비에 자동으로 맞추기 -->
  <title>html 코딩 공부</title><!-- 제목 표시줄 표시제목 -->
</head><!-- 웹 문서 머리부분 종료(제목, 주소등위치) -->

<body> <!-- 웹 문서 본문 시작(모든 주요 서비스 위치) -->
  <h1 style="text-align: center">html 태그 공부</h1>
</body><!-- 웹 문서 본문 종료(모든 주요 서비스 위치) -->

</html> <!-- 문서종료 -->
